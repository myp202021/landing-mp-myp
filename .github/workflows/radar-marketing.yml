name: Radar Semanal — Marketing Digital

on:
  schedule:
    - cron: '0 11 * * 1'   # Lunes 11:00 UTC = 08:00 AM Chile
  workflow_dispatch:         # Disparo manual para testing

jobs:
  radar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependencias
        run: npm install node-fetch@2

      - name: Ejecutar Radar Semanal
        env:
          APIFY_TOKEN:          ${{ secrets.APIFY_TOKEN }}
          RESEND:               ${{ secrets.RESEND }}
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: node scripts/scrape-radar-marketing.js
