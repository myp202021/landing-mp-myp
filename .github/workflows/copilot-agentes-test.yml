name: "Copilot — Pipeline completo (scraping + agentes)"

on:
  schedule:
    - cron: '30 10 * * 1-5'  # L-V 07:30 AM Chile (diario)
    - cron: '0 12 * * 1'     # Lunes 09:00 AM Chile (semanal)
    - cron: '0 12 1 * *'     # 1ro del mes 09:00 AM Chile (mensual)
  workflow_dispatch:
    inputs:
      modo:
        description: 'Modo: diario, semanal o mensual'
        required: true
        default: 'diario'
      id:
        description: 'ID suscripción (vacío = todos activos)'
        required: false
        default: ''
      dry_run:
        description: 'Dry run (no envía emails)'
        required: false
        default: 'false'
      mock:
        description: 'Mock mode (no Apify, datos ficticios)'
        required: false
        default: 'false'

jobs:
  agentes:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm install node-fetch@2 @supabase/supabase-js@2 ws

      - name: "Detectar modo y correr Copilot"
        run: |
          # Si es dispatch manual, usar los inputs
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            MODO="${{ github.event.inputs.modo }}"
            ID="${{ github.event.inputs.id }}"
            DRY="${{ github.event.inputs.dry_run }}"
          else
            # Auto-detectar modo por día/fecha
            DOW=$(date -u +%u)  # 1=lunes, 5=viernes
            DOM=$(date -u +%d)  # día del mes
            if [ "$DOM" = "01" ]; then
              MODO="mensual"
            elif [ "$DOW" = "1" ]; then
              MODO="semanal"
            else
              MODO="diario"
            fi
            ID=""
            DRY="false"
          fi

          MOCK="${{ github.event.inputs.mock }}"
          CMD="node scripts/radar-clipping.js --${MODO}"
          if [ "$DRY" = "true" ]; then CMD="$CMD --dry-run"; fi
          if [ "$MOCK" = "true" ]; then CMD="$CMD --mock"; fi
          if [ -n "$ID" ]; then CMD="$CMD --id=$ID"; fi

          echo "Modo: $MODO | Dispatch: ${{ github.event_name }}"
          echo "Ejecutando: $CMD"
          $CMD
        env:
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
          LINKDAPI_KEY: ${{ secrets.LINKDAPI_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY_GRILLAS: ${{ secrets.ANTHROPIC_API_KEY_GRILLAS }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          RESEND: ${{ secrets.RESEND }}
