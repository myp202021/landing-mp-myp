name: Pipeline Prospección Semanal

on:
  # Lunes 09:00 AM Chile (12:00 UTC)
  schedule:
    - cron: '0 12 * * 1'
  # Manual con opciones
  workflow_dispatch:
    inputs:
      industry:
        description: 'Industria: inmobiliaria, saas, o ambas'
        required: true
        default: 'ambas'
      max_results:
        description: 'Max empresas por query de descubrimiento'
        required: false
        default: '30'
      stage:
        description: 'Etapa: all, discover, enrich, outreach'
        required: false
        default: 'all'
      dry_run:
        description: 'Dry run (no envía emails): true/false'
        required: false
        default: 'true'

jobs:
  # ══════════════════════════════════════
  # INMOBILIARIAS (30 empresas)
  # ══════════════════════════════════════
  inmobiliarias:
    if: ${{ github.event.inputs.industry == 'inmobiliaria' || github.event.inputs.industry == 'ambas' || github.event_name == 'schedule' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install node-fetch@2 @supabase/supabase-js

      # Descubrir empresas
      - name: "Descubrir inmobiliarias"
        if: ${{ github.event.inputs.stage == 'all' || github.event.inputs.stage == 'discover' || github.event_name == 'schedule' }}
        run: node scripts/prospect-discover.js inmobiliarias ${{ github.event.inputs.max_results || '30' }}
        env:
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

      - run: sleep 10
        if: ${{ github.event.inputs.stage == 'all' || github.event_name == 'schedule' }}

      # Enriquecer (emails + RRSS)
      - name: "Enriquecer inmobiliarias"
        if: ${{ github.event.inputs.stage == 'all' || github.event.inputs.stage == 'enrich' || github.event_name == 'schedule' }}
        run: node scripts/prospect-enrich.js --industry inmobiliaria --limit 30
        env:
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

      - run: sleep 5
        if: ${{ github.event.inputs.stage == 'all' || github.event_name == 'schedule' }}

      # Verificar emails con Snov.io
      - name: "Verificar emails inmobiliarias (Snov.io)"
        if: ${{ github.event.inputs.stage == 'all' || github.event.inputs.stage == 'verify' || github.event_name == 'schedule' }}
        run: node scripts/prospect-verify-emails.js --industry inmobiliaria --limit 30
        env:
          SNOVIO_CLIENT_ID: ${{ secrets.SNOVIO_CLIENT_ID }}
          SNOVIO_CLIENT_SECRET: ${{ secrets.SNOVIO_CLIENT_SECRET }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

      # Outreach (solo si hay calificadas)
      - name: "Enviar benchmark inmobiliarias"
        if: ${{ github.event.inputs.stage == 'all' || github.event.inputs.stage == 'outreach' || github.event_name == 'schedule' }}
        run: |
          DRY_FLAG=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            DRY_FLAG="--dry-run"
          fi
          # En schedule (cron), siempre dry-run por seguridad
          if [ "${{ github.event_name }}" = "schedule" ]; then
            DRY_FLAG="--dry-run"
          fi
          node scripts/prospect-outreach.js --industry inmobiliaria --limit 30 $DRY_FLAG
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          RESEND: ${{ secrets.RESEND }}

  # ══════════════════════════════════════
  # SAAS (30 empresas)
  # ══════════════════════════════════════
  saas:
    if: ${{ github.event.inputs.industry == 'saas' || github.event.inputs.industry == 'ambas' || github.event_name == 'schedule' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install node-fetch@2 @supabase/supabase-js

      # Descubrir empresas
      - name: "Descubrir SaaS"
        if: ${{ github.event.inputs.stage == 'all' || github.event.inputs.stage == 'discover' || github.event_name == 'schedule' }}
        run: node scripts/prospect-discover.js saas ${{ github.event.inputs.max_results || '30' }}
        env:
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

      - run: sleep 10
        if: ${{ github.event.inputs.stage == 'all' || github.event_name == 'schedule' }}

      # Enriquecer
      - name: "Enriquecer SaaS"
        if: ${{ github.event.inputs.stage == 'all' || github.event.inputs.stage == 'enrich' || github.event_name == 'schedule' }}
        run: node scripts/prospect-enrich.js --industry saas --limit 30
        env:
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

      - run: sleep 5
        if: ${{ github.event.inputs.stage == 'all' || github.event_name == 'schedule' }}

      # Verificar emails con Snov.io
      - name: "Verificar emails SaaS (Snov.io)"
        if: ${{ github.event.inputs.stage == 'all' || github.event.inputs.stage == 'verify' || github.event_name == 'schedule' }}
        run: node scripts/prospect-verify-emails.js --industry saas --limit 30
        env:
          SNOVIO_CLIENT_ID: ${{ secrets.SNOVIO_CLIENT_ID }}
          SNOVIO_CLIENT_SECRET: ${{ secrets.SNOVIO_CLIENT_SECRET }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

      # Outreach
      - name: "Enviar benchmark SaaS"
        if: ${{ github.event.inputs.stage == 'all' || github.event.inputs.stage == 'outreach' || github.event_name == 'schedule' }}
        run: |
          DRY_FLAG=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            DRY_FLAG="--dry-run"
          fi
          if [ "${{ github.event_name }}" = "schedule" ]; then
            DRY_FLAG="--dry-run"
          fi
          node scripts/prospect-outreach.js --industry saas --limit 30 $DRY_FLAG
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          RESEND: ${{ secrets.RESEND }}

  # ══════════════════════════════════════
  # ALERTA SI FALLA
  # ══════════════════════════════════════
  notify-failure:
    needs: [inmobiliarias, saas]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install node-fetch@2
      - run: |
          node -e "
          const fetch = require('node-fetch');
          fetch('https://api.resend.com/emails', {
            method: 'POST',
            headers: { 'Authorization': 'Bearer ${{ secrets.RESEND }}', 'Content-Type': 'application/json' },
            body: JSON.stringify({
              from: 'Müller & Pérez <contacto@mulleryperez.cl>',
              to: ['contacto@mulleryperez.cl'],
              subject: '⚠️ FALLO Pipeline Prospección Semanal',
              html: '<h2>El pipeline de prospección falló</h2><p><a href=\"https://github.com/myp202021/landing-mp-myp/actions\">Ver logs</a></p>'
            })
          }).catch(e => console.error(e));
          "
