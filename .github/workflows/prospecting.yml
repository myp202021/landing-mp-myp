name: Pipeline Prospección Automática

on:
  # Manual — elige industria y modo
  workflow_dispatch:
    inputs:
      industry:
        description: 'Industria: inmobiliarias, saas, o query libre'
        required: true
        default: 'inmobiliarias'
      max_results:
        description: 'Max empresas por query de descubrimiento'
        required: false
        default: '100'
      mode:
        description: 'Modo benchmark: basico o pro'
        required: false
        default: 'basico'
      stage:
        description: 'Etapa: all, discover, enrich, benchmark, outreach'
        required: false
        default: 'all'
      dry_run:
        description: 'Dry run (no envía emails): true/false'
        required: false
        default: 'true'

jobs:
  prospect:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependencias
        run: npm install node-fetch@2 @supabase/supabase-js

      # ── ETAPA 1: Descubrimiento ──
      - name: "Etapa 1: Descubrimiento de empresas"
        if: ${{ github.event.inputs.stage == 'all' || github.event.inputs.stage == 'discover' }}
        run: node scripts/prospect-discover.js "${{ github.event.inputs.industry }}" "${{ github.event.inputs.max_results }}"
        env:
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

      # Pausa entre etapas
      - name: Pausa entre descubrimiento y enriquecimiento
        if: ${{ github.event.inputs.stage == 'all' }}
        run: sleep 10

      # ── ETAPA 2: Enriquecimiento ──
      - name: "Etapa 2: Enriquecimiento (emails + RRSS)"
        if: ${{ github.event.inputs.stage == 'all' || github.event.inputs.stage == 'enrich' }}
        run: node scripts/prospect-enrich.js --industry "${{ github.event.inputs.industry }}" --limit 200
        env:
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

      - name: Pausa entre enriquecimiento y benchmark
        if: ${{ github.event.inputs.stage == 'all' }}
        run: sleep 10

      # ── ETAPA 3: Benchmark ──
      - name: "Etapa 3: Benchmark"
        if: ${{ github.event.inputs.stage == 'all' || github.event.inputs.stage == 'benchmark' }}
        run: |
          PRO_FLAG=""
          if [ "${{ github.event.inputs.mode }}" = "pro" ]; then
            PRO_FLAG="--pro"
          fi
          node scripts/prospect-benchmark.js $PRO_FLAG --industry "${{ github.event.inputs.industry }}" --limit 200
        env:
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          GOOGLE_PAGESPEED_API_KEY: ${{ secrets.GOOGLE_PAGESPEED_API_KEY }}

      - name: Pausa entre benchmark y outreach
        if: ${{ github.event.inputs.stage == 'all' }}
        run: sleep 5

      # ── ETAPA 4: Outreach ──
      - name: "Etapa 4: Outreach (email 1)"
        if: ${{ github.event.inputs.stage == 'all' || github.event.inputs.stage == 'outreach' }}
        run: |
          DRY_FLAG=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            DRY_FLAG="--dry-run"
          fi
          node scripts/prospect-outreach.js $DRY_FLAG --industry "${{ github.event.inputs.industry }}" --limit 50
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          RESEND: ${{ secrets.RESEND }}

      # ── Alerta si falla ──
      - name: Alerta si falla
        if: failure()
        run: |
          node -e "
          const fetch = require('node-fetch');
          fetch('https://api.resend.com/emails', {
            method: 'POST',
            headers: { 'Authorization': 'Bearer ${{ secrets.RESEND }}', 'Content-Type': 'application/json' },
            body: JSON.stringify({
              from: 'Müller & Pérez <contacto@mulleryperez.cl>',
              to: ['contacto@mulleryperez.cl'],
              subject: '⚠️ FALLO Pipeline Prospección — $(date -u +%Y-%m-%d)',
              html: '<h2>El pipeline de prospección falló</h2><p>Industria: ${{ github.event.inputs.industry }}</p><p>Etapa: ${{ github.event.inputs.stage }}</p><p><a href=\"https://github.com/myp202021/landing-mp-myp/actions\">Ver logs</a></p>'
            })
          }).then(r => r.json()).then(d => console.log('Alerta enviada:', d.id)).catch(e => console.error(e));
          "
