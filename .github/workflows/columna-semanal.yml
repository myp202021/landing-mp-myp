name: Columna Semanal — Christopher Müller

on:
  schedule:
    - cron: '0 10 * * 1'    # Lunes 07:00 AM Chile (UTC-3)
  workflow_dispatch:

jobs:
  columna:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Instalar dependencias
        run: npm install node-fetch@2 @supabase/supabase-js@2

      - name: Generar y publicar columna
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          RESEND: ${{ secrets.RESEND }}
        run: node scripts/columna-christopher.js

      - name: Alerta si falla
        if: failure()
        env:
          RESEND: ${{ secrets.RESEND }}
        run: |
          curl -s -X POST https://api.resend.com/emails \
            -H "Authorization: Bearer $RESEND" \
            -H "Content-Type: application/json" \
            -d "{\"from\":\"M&P Bot <contacto@mulleryperez.cl>\",\"to\":[\"contacto@mulleryperez.cl\"],\"subject\":\"⚠️ FALLO Columna Christopher — $(date +%Y-%m-%d)\",\"html\":\"<p>El workflow de columna semanal falló. Revisar GitHub Actions.</p>\"}"
