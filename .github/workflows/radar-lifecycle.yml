name: "Radar Lifecycle Emails (08:00 AM Chile)"

on:
  schedule:
    - cron: '0 11 * * *'
  workflow_dispatch:

jobs:
  lifecycle:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install node-fetch@2 @supabase/supabase-js
      - name: "Enviar emails de ciclo de vida"
        run: node scripts/radar-lifecycle.js
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          RESEND: ${{ secrets.RESEND }}
