name: Reporte Diario Competencia Hualpen

on:
  schedule:
    - cron: '0 10 * * 1-5'   # 07:00 AM Chile (UTC-3) — intento principal
    - cron: '30 10 * * 1-5'  # 07:30 AM Chile (UTC-3) — respaldo si el primero no corrió
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Verificar si ya corrió hoy
        id: check
        run: |
          TODAY=$(date -u +%Y-%m-%d)
          RESULT=$(curl -s -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_KEY }}" \
            "${{ secrets.SUPABASE_URL }}/rest/v1/reportes_competencia?fecha_reporte=eq.${TODAY}&select=id&limit=1" \
            -H "apikey: ${{ secrets.SUPABASE_SERVICE_KEY }}")
          if echo "$RESULT" | grep -q '"id"'; then
            echo "already_ran=true" >> $GITHUB_OUTPUT
            echo "✅ Ya existe reporte para $TODAY — saltando ejecución"
          else
            echo "already_ran=false" >> $GITHUB_OUTPUT
            echo "🔄 No hay reporte para $TODAY — ejecutando"
          fi

      - uses: actions/checkout@v4
        if: steps.check.outputs.already_ran == 'false'

      - uses: actions/setup-node@v4
        if: steps.check.outputs.already_ran == 'false'
        with:
          node-version: '20'

      - name: Instalar wkhtmltopdf
        if: steps.check.outputs.already_ran == 'false'
        run: |
          for i in 1 2 3; do
            sudo apt-get update && sudo apt-get install -y wkhtmltopdf && break
            echo "Intento $i falló, reintentando en 10s..."
            sleep 10
          done

      - name: Instalar dependencias
        if: steps.check.outputs.already_ran == 'false'
        run: npm install node-fetch@2 @supabase/supabase-js

      - name: Ejecutar scraper
        if: steps.check.outputs.already_ran == 'false'
        id: scraper
        run: node scripts/scrape-competencia.js
        env:
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          RESEND: ${{ secrets.RESEND }}

      - name: Alerta si falla
        if: failure() && steps.check.outputs.already_ran == 'false'
        run: |
          node -e "
          const fetch = require('node-fetch');
          fetch('https://api.resend.com/emails', {
            method: 'POST',
            headers: { 'Authorization': 'Bearer ${{ secrets.RESEND }}', 'Content-Type': 'application/json' },
            body: JSON.stringify({
              from: 'contacto@mulleryperez.cl',
              to: 'contacto@mulleryperez.cl',
              subject: '⚠️ FALLO Reporte Hualpén — $(date -u +%Y-%m-%d)',
              html: '<h2>El reporte diario de Competencia Hualpén falló</h2><p>Revisa el workflow en <a href=\"https://github.com/myp202021/landing-mp-myp/actions\">GitHub Actions</a></p>'
            })
          }).then(r => r.json()).then(d => console.log('Alerta enviada:', d.id)).catch(e => console.error('Error enviando alerta:', e));
          "
