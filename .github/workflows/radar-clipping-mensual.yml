name: "Radar Clipping Mensual (1ro 09:00 AM Chile)"

on:
  schedule:
    - cron: '0 12 1 * *'
  workflow_dispatch:

jobs:
  radar:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: sudo apt-get install -y wkhtmltopdf
      - run: npm install node-fetch@2 @supabase/supabase-js
      - name: "Radar mensual - resumen consolidado con IA"
        run: node scripts/radar-clipping.js --mensual
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
          RESEND: ${{ secrets.RESEND }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
