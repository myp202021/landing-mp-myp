name: "Halterlift — Subir 10 artículos a WordPress con imagen"

on:
  workflow_dispatch:

jobs:
  upload:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm install node-fetch@2

      - name: "Subir artículos con imagen generada"
        run: node scripts/halterlift-upload.js
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
