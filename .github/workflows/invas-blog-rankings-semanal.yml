name: "Invas WMS — Blog Rankings Semanal (Jueves 08:00 AM Chile)"

on:
  schedule:
    - cron: '0 11 * * 4'  # 11:00 UTC = 08:00 AM Chile (CLT = UTC-3) — Jueves
  workflow_dispatch:

jobs:
  ranking:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm install node-fetch@2

      - name: "Generar ranking semanal"
        run: node scripts/invas-blog-rankings-semanal.js
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          INVAS_WP_URL: https://www.invaswms.com
          INVAS_WP_USER: Ad-invas-miN
          INVAS_WP_APP_PASSWORD: ${{ secrets.INVAS_WP_APP_PASSWORD }}
          RESEND: ${{ secrets.RESEND }}
