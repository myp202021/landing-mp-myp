name: Grilla Contenido — Genera

on:
  schedule:
    - cron: '0 15 15 * *'   # 15 de cada mes a las 12:00 PM Chile (UTC-3)
  workflow_dispatch:          # Ejecutar manualmente

jobs:
  generar-grilla:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependencias
        run: npm install node-fetch@2 googleapis

      - name: Ejecutar setup si no existe briefing
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [ ! -f data/agentes/genera.json ]; then
            echo "📋 Briefing no existe — ejecutando setup inicial..."
            node scripts/setup-agente-genera.js
          else
            echo "✅ Briefing existe — saltando setup"
          fi

      - name: Generar grilla mensual
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          RESEND: ${{ secrets.RESEND }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        run: node scripts/grilla-genera.js

      - name: Guardar briefing si se generó
        if: always()
        run: |
          if [ -f data/agentes/genera.json ]; then
            git config user.name "GitHub Actions"
            git config user.email "actions@github.com"
            git add data/agentes/genera.json
            git diff --cached --quiet || git commit -m "chore: update Genera agent briefing [skip ci]"
            git push || echo "Push failed — briefing not saved to repo"
          fi

      - name: Guardar CSV como artefacto
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: grilla-genera
          path: /tmp/grilla-genera-*.csv
          retention-days: 30
