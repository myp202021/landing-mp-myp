name: "Radar Propiedades CyM (04:00 AM Chile)"

on:
  schedule:
    # 04:00 AM Chile = 07:00 UTC
    # PAUSADO - cron: '0 7 * * *'
  workflow_dispatch:

jobs:
  radar:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install node-fetch@2 @supabase/supabase-js
      - name: "Scrape PI (Apify + paginación) + detectar nuevas + email"
        run: node scripts/radar-propiedades.js
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          RESEND: ${{ secrets.RESEND }}
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
