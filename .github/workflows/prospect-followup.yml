name: Prospect Follow-up Diario

on:
  schedule:
    # Lunes a viernes 10:00 AM Chile (13:00 UTC)
    - cron: '0 13 * * 1-5'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (no envía): true/false'
        required: false
        default: 'false'

jobs:
  followup:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependencias
        run: npm install node-fetch@2 @supabase/supabase-js

      - name: Ejecutar follow-up
        run: |
          DRY_FLAG=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            DRY_FLAG="--dry-run"
          fi
          node scripts/prospect-followup.js $DRY_FLAG
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          RESEND: ${{ secrets.RESEND }}

      - name: Alerta si falla
        if: failure()
        run: |
          node -e "
          const fetch = require('node-fetch');
          fetch('https://api.resend.com/emails', {
            method: 'POST',
            headers: { 'Authorization': 'Bearer ${{ secrets.RESEND }}', 'Content-Type': 'application/json' },
            body: JSON.stringify({
              from: 'contacto@mulleryperez.cl',
              to: ['contacto@mulleryperez.cl'],
              subject: '⚠️ FALLO Follow-up Prospección',
              html: '<p>El follow-up diario falló. <a href=\"https://github.com/myp202021/landing-mp-myp/actions\">Ver logs</a></p>'
            })
          }).catch(e => console.error(e));
          "
