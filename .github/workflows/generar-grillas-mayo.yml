name: "Grillas Mayo 2026 — Pipeline completo"

on:
  workflow_dispatch:
    inputs:
      fase:
        description: 'Fase: briefings, grillas, revisor, todo'
        required: true
        default: 'todo'
      limite_clientes:
        description: 'Max clientes a procesar (0 = todos)'
        required: false
        default: '0'

jobs:
  # ══════════════════════════════════════
  # FASE 1: Generar briefings faltantes
  # ══════════════════════════════════════
  briefings:
    if: ${{ github.event.inputs.fase == 'briefings' || github.event.inputs.fase == 'todo' }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install node-fetch@2 @supabase/supabase-js

      - name: "Fase 1: Generar briefings con OpenAI"
        run: |
          LIMIT="${{ github.event.inputs.limite_clientes }}"
          if [ "$LIMIT" = "0" ]; then LIMIT="50"; fi
          node scripts/generar-fichas-clientes.js --limit $LIMIT
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

  # ══════════════════════════════════════
  # FASE 2: Generar grillas mayo
  # ══════════════════════════════════════
  grillas:
    needs: [briefings]
    if: ${{ always() && (github.event.inputs.fase == 'grillas' || github.event.inputs.fase == 'todo') }}
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install node-fetch@2 @supabase/supabase-js

      - name: "Fase 2: Generar grillas mayo + Ads Creative (Copilot)"
        run: |
          LIMIT="${{ github.event.inputs.limite_clientes }}"
          if [ "$LIMIT" = "0" ]; then
            node scripts/generar-grilla-pro.js all 5 2026 "Día del Trabajador, Día de la Madre, CyberDay, otoño Chile"
          else
            node scripts/generar-grilla-pro.js all 5 2026 "Día del Trabajador, Día de la Madre, CyberDay, otoño Chile"
          fi
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY_GRILLAS: ${{ secrets.ANTHROPIC_API_KEY_GRILLAS }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

  # ══════════════════════════════════════
  # FASE 3: Revisor heurístico + auto-fix con OpenAI
  # ══════════════════════════════════════
  revisor:
    needs: [grillas]
    if: ${{ always() && needs.grillas.result == 'success' && (github.event.inputs.fase == 'revisor' || github.event.inputs.fase == 'todo') }}
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install node-fetch@2

      - name: "Fase 3: Revisor + auto-fix"
        run: node scripts/revisar-grillas.js 5 2026 --fix
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          RESEND: ${{ secrets.RESEND }}

  # ══════════════════════════════════════
  # ALERTA solo si falla algún job
  # ══════════════════════════════════════
  notify:
    needs: [grillas, revisor]
    if: always() && (needs.grillas.result == 'failure' || needs.revisor.result == 'failure')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install node-fetch@2
      - run: |
          GRILLAS_STATUS="${{ needs.grillas.result }}"
          REVISOR_STATUS="${{ needs.revisor.result }}"
          node -e "
          const fetch = require('node-fetch');
          fetch('https://api.resend.com/emails', {
            method: 'POST',
            headers: { 'Authorization': 'Bearer ${{ secrets.RESEND }}', 'Content-Type': 'application/json' },
            body: JSON.stringify({
              from: 'Muller y Perez <contacto@mulleryperez.cl>',
              to: ['contacto@mulleryperez.cl'],
              subject: 'Pipeline Grillas Mayo 2026 — FALLO',
              html: '<h2>Pipeline falló</h2><p>Grillas: ${GRILLAS_STATUS}</p><p>Revisor: ${REVISOR_STATUS}</p><p><a href=\"https://github.com/myp202021/landing-mp-myp/actions\">Ver logs</a></p>'
            })
          }).catch(e => console.error(e));
          "
